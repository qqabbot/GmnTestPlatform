# Docker 部署时使用，仅覆盖端口与日志级别；数据源沿用 application.yml 中的配置
# 激活方式: SPRING_PROFILES_ACTIVE=docker

server:
  port: 4000

# 不覆盖 spring.datasource，使用 application.yml 中已配置的 MySQL

logging:
  level:
    root: INFO
    com.testing.automation: INFO
    com.zaxxer.hikari: WARN
    com.mysql: WARN
    org.springframework.jdbc: WARN
