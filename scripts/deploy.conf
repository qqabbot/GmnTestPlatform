# 部署配置（在服务器上按需修改）
# 使用方式: 在 deploy.sh 同目录，或 export 上述变量后执行 deploy.sh

# 项目根目录（含 docker-compose.yml）
PROJECT_ROOT="${PROJECT_ROOT:-/home/carsome/QA/GmnTestPlatform}"

# Docker Compose 命令（需 sudo 时可改为 sudo docker compose）
DOCKER_COMPOSE_CMD="${DOCKER_COMPOSE_CMD:-docker compose}"

# 构建时是否使用 --no-cache（true 更干净，false 更快）
BUILD_NO_CACHE="${BUILD_NO_CACHE:-false}"
