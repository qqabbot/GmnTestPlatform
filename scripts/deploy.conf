# 部署配置（在服务器上按需修改）
# 使用方式: 在 deploy.sh 同目录，或 export DEPLOY_CONF=/path/to/deploy.conf 后执行 deploy.sh

# 项目根目录（git 仓库根，含 docker-compose.yml）
PROJECT_ROOT="${PROJECT_ROOT:-/home/carsome/QA/GmnTestPlatform}"

# 拉取代码时的分支
GIT_BRANCH="${GIT_BRANCH:-main}"

# 是否在构建前执行 git pull（true / false）
GIT_PULL_ENABLED="${GIT_PULL_ENABLED:-true}"

# Docker Compose 命令（优先使用插件形式）
DOCKER_COMPOSE_CMD="${DOCKER_COMPOSE_CMD:-docker compose}"

# 构建时是否使用 --no-cache（true 更干净，false 更快）
BUILD_NO_CACHE="${BUILD_NO_CACHE:-false}"
