services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: gmn-backend:latest
    container_name: gmn-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      # 数据源使用 application.yml 中已配置的 MySQL，此处不覆盖
    ports:
      - "4000:4000"
    volumes:
      - backend_data:/app/data
      - backend_videos:/app/videos
      - backend_screenshots:/app/screenshots
      - backend_allure:/app/allure-results

  frontend:
    build:
      context: ./frontend-app
      dockerfile: Dockerfile
    image: gmn-frontend:latest
    container_name: gmn-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5000:80"

volumes:
  backend_data:
  backend_videos:
  backend_screenshots:
  backend_allure:
