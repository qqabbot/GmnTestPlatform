services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: gmn-backend:latest
    container_name: gmn-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      # 数据源由外部 MySQL 提供，通过 .env 或部署环境设置 SPRING_DATASOURCE_URL / USERNAME / PASSWORD
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-testplatform}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-testplatform}
    ports:
      - "4000:4000"
    volumes:
      - backend_data:/app/data
      - backend_videos:/app/videos
      - backend_screenshots:/app/screenshots
      - backend_allure:/app/allure-results

  frontend:
    build:
      context: ./frontend-app
      dockerfile: Dockerfile
    image: gmn-frontend:latest
    container_name: gmn-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5000:80"

volumes:
  backend_data:
  backend_videos:
  backend_screenshots:
  backend_allure:
