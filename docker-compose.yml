services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: gmn-backend:latest
    container_name: gmn-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      # 显式传入数据源，避免被 .env 或宿主机空变量覆盖导致 url 未指定
      SPRING_DATASOURCE_URL: jdbc:mysql://10.48.0.13:3306/TestPlatform?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: insp_dev
      SPRING_DATASOURCE_PASSWORD: insp_dev@123
    ports:
      - "4000:4000"
    volumes:
      - backend_data:/app/data
      - backend_videos:/app/videos
      - backend_screenshots:/app/screenshots
      - backend_allure:/app/allure-results

  frontend:
    build:
      context: ./frontend-app
      dockerfile: Dockerfile
    image: gmn-frontend:latest
    container_name: gmn-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5000:80"

volumes:
  backend_data:
  backend_videos:
  backend_screenshots:
  backend_allure:
