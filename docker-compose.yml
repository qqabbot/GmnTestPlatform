services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: gmn-backend:latest
    container_name: gmn-backend
    restart: unless-stopped
    # Playwright/Chromium in Docker: ipc=host 避免 Chromium 内存问题，init 避免僵尸进程
    ipc: host
    init: true
    # 强制使用 default profile（覆盖镜像内可能残留的 SPRING_PROFILES_ACTIVE=docker），只用 application.yml
    environment:
      SPRING_PROFILES_ACTIVE: "default"
    ports:
      - "4000:4000"
    volumes:
      - backend_data:/app/data
      - backend_videos:/app/videos
      - backend_screenshots:/app/screenshots
      - backend_allure:/app/allure-results

  frontend:
    build:
      context: ./frontend-app
      dockerfile: Dockerfile
    image: gmn-frontend:latest
    container_name: gmn-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5000:80"

volumes:
  backend_data:
  backend_videos:
  backend_screenshots:
  backend_allure:
